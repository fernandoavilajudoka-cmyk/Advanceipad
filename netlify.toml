# Configuración de Netlify para el repo Advanceipad
# Sitio estático: se publica la raíz del repo (sin build).
#  · Cada cliente vive en /clientes/<slug>/  (una carpeta = una liga).
#  · La raíz "/" sirve un informe destacado (hoy: Tepeyac).
#  · La plantilla reutilizable queda en /plantilla y /index.html
# Para cambiar qué informe se muestra en la raíz, edita el "to" del primer redirect.

[build]
  publish = "."
  command = ""

# La raíz muestra el informe de Fertilizantes Tepeyac
[[redirects]]
  from = "/"
  to = "/clientes/tepeyac/index.html"
  status = 200

# Compatibilidad con la liga antigua (/tepeyac.html)
[[redirects]]
  from = "/tepeyac.html"
  to = "/clientes/tepeyac/index.html"
  status = 301

# Acceso directo a la plantilla base (modo demostrativo)
[[redirects]]
  from = "/plantilla"
  to = "/index.html"
  status = 200

# Bloqueo de la base de clientes/renovaciones (contiene PII).
# force=true intercepta aunque exista el archivo: nunca se sirve públicamente.
[[redirects]]
  from = "/crm-renovaciones/*"
  to = "/index.html"
  status = 404
  force = true

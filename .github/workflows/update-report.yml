name: Actualizar informe Tepeyac

# Se ejecuta automáticamente cada día y también de forma manual.
# Regenera tepeyac.html con datos reales del CAN y hace push → Netlify redespliega.
on:
  schedule:
    - cron: '0 12 * * *'    # diario 12:00 UTC (~06:00–07:00 hora MX)
  workflow_dispatch: {}

permissions:
  contents: write            # necesario para hacer push del informe actualizado

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar informe con datos reales
        env:
          # Secret por cliente → variable genérica que lee el script.
          # Para otro cliente, duplica este workflow y cambia el secret.
          MAPON_API_KEY: ${{ secrets.FERTILIZANTESTEPEYAC }}
        run: node scripts/build-report.mjs

      - name: Publicar cambios (si los hay)
        run: |
          git config user.name "advance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tepeyac.html
          if git diff --cached --quiet; then
            echo "Sin cambios en el informe."
          else
            git commit -m "Auto: actualizar informe Tepeyac ($(date -u +%Y-%m-%d))"
            git push
          fi
